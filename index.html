<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maygrabli — Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    /* ── Password Gate ── */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .gate-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* Logo in gate */
    .gate-logo {
      margin: 0 auto 20px;
      display: block;
      max-height: 64px;
      max-width: 200px;
      object-fit: contain;
    }

    .gate-artist-name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .gate-subtitle {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aeaeb2;
      margin-bottom: 28px;
    }

    .gate-card input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1d1d6;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .gate-card input[type="password"]:focus { border-color: #0071e3; }

    .gate-card button {
      width: 100%;
      padding: 12px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gate-card button:hover { background: #0077ed; }

    #gate-error {
      color: #ff3b30;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── App ── */
    #app { display: none; }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Logo image — shown when ARTIST_LOGO is set */
    #header-logo {
      height: 40px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* Text fallback — shown when no logo */
    #header-name {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .header-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aeaeb2;
      border-left: 1px solid #e5e5ea;
      padding-left: 14px;
      line-height: 1;
    }

    #header-count {
      font-size: 0.85rem;
      color: #6e6e73;
    }

    /* ── Filters ── */
    #filters {
      display: flex;
      gap: 8px;
      padding: 20px 32px 0;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #d1d1d6;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: #1d1d1f;
    }

    .filter-btn:hover { border-color: #0071e3; color: #0071e3; }

    .filter-btn.active {
      background: #0071e3;
      border-color: #0071e3;
      color: #fff;
    }

    /* ── Count ── */
    #count {
      padding: 12px 32px 0;
      font-size: 0.85rem;
      color: #6e6e73;
    }

    /* ── Grid ── */
    #grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 32px 40px;
      max-width: 860px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
      transition: box-shadow 0.15s;
      overflow: hidden;
    }

    .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.11); }

    /* Screenshot — small thumbnail on the right, only shown when present */
    .card-thumb {
      flex-shrink: 0;
      width: 120px;
      height: 80px;
      object-fit: cover;
      cursor: zoom-in;
      border-left: 1px solid #f0f0f5;
      order: 2;
      align-self: stretch;
    }

    .card-body {
      padding: 14px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      order: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-uiux    { background: #ffeef0; color: #c0392b; }
    .badge-idea    { background: #eaf4ff; color: #0071e3; }
    .badge-flow    { background: #edfaf1; color: #27ae60; }
    .badge-general { background: #f5f0ff; color: #7b2fff; }

    .card-id { font-size: 0.72rem; color: #aeaeb2; }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #4a4a50;
      line-height: 1.55;
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: #6e6e73;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }

    #lightbox-close:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 20px; }
      #filters, #count { padding-left: 20px; padding-right: 20px; }
      #grid { padding: 16px 20px 32px; gap: 16px; grid-template-columns: 1fr; }
      .header-label { display: none; }
    }
  </style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <div class="gate-card">
    <!-- Logo or name — populated by JS from config -->
    <div id="gate-identity"></div>
    <p class="gate-subtitle">Feedback Board</p>
    <input type="password" id="pw-input" placeholder="Password" autofocus>
    <button onclick="checkPassword()">Enter</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- Feedback App -->
<div id="app">
  <header>
    <div class="header-left">
      <div id="header-identity"></div>
      <span class="header-label">Feedback</span>
    </div>
    <span id="header-count"></span>
  </header>

  <div id="filters">
    <button class="filter-btn active" data-cat="All" onclick="setFilter(this)">All</button>
    <button class="filter-btn" data-cat="UI/UX Bug" onclick="setFilter(this)">UI/UX Bug</button>
    <button class="filter-btn" data-cat="Product Idea" onclick="setFilter(this)">Product Idea</button>
    <button class="filter-btn" data-cat="User Flow" onclick="setFilter(this)">User Flow</button>
    <button class="filter-btn" data-cat="General" onclick="setFilter(this)">General</button>
  </div>

  <div id="count"></div>

  <div id="grid">
    <div id="empty">No feedback items yet.</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  // ═══════════════════════════════════════════════════════
  //  CONFIG — edit these two blocks to customize per artist
  // ═══════════════════════════════════════════════════════

  // Artist display name (used when no logo image is set)
  const ARTIST_NAME = "maygrabli";

  // Logo image path — set to null to use text name instead
  // Example: const ARTIST_LOGO = "logo.png";
  const ARTIST_LOGO = null;

  // SHA-256 hash of the password. Current password: "iseeart"
  // To change: run `echo -n "yourpassword" | shasum -a 256`
  const PASSWORD_HASH = "f9d7ce1ef900e2ff3cf2706489d409e7a51ccfb3134ffb85245fbb7ff6272ebb";

  // ═══════════════════════════════════════════════════════

  // Render artist identity in gate + header
  function renderIdentity(containerId, isGate) {
    const el = document.getElementById(containerId);
    if (ARTIST_LOGO) {
      const img = document.createElement("img");
      img.src = ARTIST_LOGO;
      img.alt = ARTIST_NAME;
      img.className = isGate ? "gate-logo" : "";
      if (!isGate) { img.id = "header-logo"; }
      el.appendChild(img);
    } else {
      const name = document.createElement(isGate ? "div" : "div");
      name.className = isGate ? "gate-artist-name" : "";
      if (!isGate) { name.id = "header-name"; }
      name.textContent = ARTIST_NAME;
      el.appendChild(name);
    }
  }

  renderIdentity("gate-identity", true);
  renderIdentity("header-identity", false);
  document.title = `${ARTIST_NAME} — Feedback`;

  let allItems = [];
  let activeFilter = "All";

  // ── Password Gate ──
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });

  async function checkPassword() {
    const input = document.getElementById("pw-input").value;
    const hash = await sha256(input);
    if (hash === PASSWORD_HASH) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      sessionStorage.setItem("auth", "1");
      loadFeedback();
    } else {
      document.getElementById("gate-error").textContent = "Incorrect password. Try again.";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  if (sessionStorage.getItem("auth") === "1") {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadFeedback();
  }

  // ── Data Loading ──
  async function loadFeedback() {
    try {
      const res = await fetch("feedback.json?" + Date.now());
      allItems = await res.json();
      render();
    } catch (e) {
      document.getElementById("grid").innerHTML = '<p style="color:#ff3b30;padding:20px">Failed to load feedback.json</p>';
    }
  }

  // ── Rendering ──
  function badgeClass(cat) {
    if (cat === "UI/UX Bug")    return "badge-uiux";
    if (cat === "Product Idea") return "badge-idea";
    if (cat === "User Flow")    return "badge-flow";
    return "badge-general";
  }

  function render() {
    const items = activeFilter === "All"
      ? allItems
      : allItems.filter(i => i.category === activeFilter);

    document.getElementById("header-count").textContent = `${allItems.length} item${allItems.length !== 1 ? "s" : ""}`;
    document.getElementById("count").textContent =
      activeFilter === "All"
        ? `Showing all ${items.length} item${items.length !== 1 ? "s" : ""}`
        : `Showing ${items.length} item${items.length !== 1 ? "s" : ""} in "${activeFilter}"`;

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    if (items.length === 0) {
      const empty = document.createElement("div");
      empty.id = "empty";
      empty.style.display = "block";
      empty.textContent = allItems.length === 0 ? "No feedback items yet." : `No items in "${activeFilter}".`;
      grid.appendChild(empty);
      return;
    }

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const thumb = item.screenshot
        ? `<img class="card-thumb" src="screenshots/${item.screenshot}" alt="${escHtml(item.title)}" loading="lazy" onclick="openLightbox('screenshots/${item.screenshot}')">`
        : "";

      card.innerHTML = `
        <div class="card-body">
          <div class="card-meta">
            <span class="badge ${badgeClass(item.category)}">${item.category}</span>
            <span class="card-id">#${item.id}</span>
          </div>
          <div class="card-title">${escHtml(item.title)}</div>
          <div class="card-desc">${escHtml(item.description)}</div>
        </div>
        ${thumb}
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Filters ──
  function setFilter(btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    render();
  }

  // ── Lightbox ──
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("open");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.getElementById("lightbox-img").src = "";
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeLightbox();
  });
</script>
</body>
</html>
