<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alon's isee.art feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --border:    #e5e5ea;
      --text:      #1d1d1f;
      --text-2:    #6e6e73;
      --text-3:    #aeaeb2;
      --text-4:    #c7c7cc;
      --hover-bg:  #f0f0f5;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.07);
      --card-shadow-hover: 0 3px 14px rgba(0,0,0,0.11);
    }

    body.dark {
      --bg:        #1c1c1e;
      --surface:   #2c2c2e;
      --border:    #3a3a3c;
      --text:      #f5f5f7;
      --text-2:    #aeaeb2;
      --text-3:    #6e6e73;
      --text-4:    #48484a;
      --hover-bg:  #3a3a3c;
      --card-shadow: 0 1px 6px rgba(0,0,0,0.3);
      --card-shadow-hover: 0 3px 16px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Gate ── */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .gate-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .gate-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .gate-subtitle {
      font-size: 0.85rem;
      color: var(--text-2);
      margin-bottom: 28px;
    }

    .gate-card input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    .gate-card input[type="password"]:focus { border-color: #0071e3; }

    .gate-card button {
      width: 100%;
      padding: 12px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gate-card button:hover { background: #0077ed; }

    #gate-error {
      color: #ff3b30;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── App ── */
    #app { display: none; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 1.05rem; font-weight: 700; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    #header-count { font-size: 0.85rem; color: var(--text-2); }

    #sync-indicator {
      font-size: 0.75rem;
      color: var(--text-3);
      min-width: 52px;
      text-align: right;
    }

    #sync-indicator.saving { color: #ff9500; }
    #sync-indicator.saved  { color: #34c759; }
    #sync-indicator.error  { color: #ff3b30; }

    #dark-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    #dark-btn:hover { opacity: 1; }

    #token-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }

    #token-btn:hover { border-color: #0071e3; color: #0071e3; }
    #token-btn.connected { border-color: #34c759; color: #34c759; }

    /* ── Token modal ── */
    #token-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    #token-modal-bg.open { display: flex; }

    #token-modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #token-modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    #token-modal p  { font-size: 0.82rem; color: var(--text-2); margin-bottom: 16px; line-height: 1.5; }

    #token-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 14px;
    }

    #token-input:focus { border-color: #0071e3; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .modal-btn-secondary { background: var(--hover-bg); color: var(--text); }
    .modal-btn-primary   { background: #0071e3; color: #fff; }
    .modal-btn-danger    { background: #fff0f0; color: #ff3b30; }

    /* ── Filter bar ── */
    #filter-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 12px 32px 0;
      flex-wrap: wrap;
      row-gap: 8px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .filter-group + .filter-group::before {
      content: "";
      display: block;
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 10px;
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      color: var(--text-2);
      white-space: nowrap;
    }

    .filter-btn:hover { background: var(--hover-bg); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--bg); }

    /* Status active overrides */
    .filter-btn.active[data-val="Open"]       { background: #0071e3; }
    .filter-btn.active[data-val="Done"]       { background: #34c759; }
    .filter-btn.active[data-val="Irrelevant"] { background: #8e8e93; }

    /* Priority active overrides */
    .filter-btn.active[data-val="High"]   { background: #ff3b30; }
    .filter-btn.active[data-val="Medium"] { background: #ff9500; }
    .filter-btn.active[data-val="Low"]    { background: #8e8e93; }

    /* ── Count ── */
    #count {
      padding: 8px 32px 0;
      font-size: 0.8rem;
      color: var(--text-2);
    }

    /* ── Grid ── */
    #grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 32px 40px;
      max-width: 860px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      overflow: hidden;
      transition: box-shadow 0.15s, opacity 0.2s;
    }

    .card:hover { box-shadow: var(--card-shadow-hover); }
    .card[data-status="Done"]       { opacity: 0.6; }
    .card[data-status="Irrelevant"] { opacity: 0.35; }
    .card[data-status="Irrelevant"] .card-title { text-decoration: line-through; }

    .card-thumb {
      flex-shrink: 0;
      width: 120px;
      height: 80px;
      object-fit: cover;
      cursor: zoom-in;
      border-left: 1px solid var(--border);
      order: 2;
      align-self: stretch;
    }

    .card-body {
      padding: 11px 15px 13px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      order: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-uiux    { background: #ffeef0; color: #c0392b; }
    .badge-idea    { background: #eaf4ff; color: #0071e3; }
    .badge-flow    { background: #edfaf1; color: #27ae60; }
    .badge-general { background: #f5f0ff; color: #7b2fff; }

    .status-btn {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      user-select: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .status-btn:hover  { opacity: 0.75; }
    .status-btn:active { transform: scale(0.93); }
    .status-open       { background: #e8f4fd; color: #0071e3; }
    .status-done       { background: #e9fbe9; color: #27ae60; }
    .status-irrelevant { background: #f2f2f7; color: #8e8e93; }

    .card-id      { font-size: 0.7rem; color: var(--text-4); }
    .card-section { font-size: 0.72rem; color: var(--text-3); }

    .priority-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .priority-dot-high   { background: #ff3b30; }
    .priority-dot-medium { background: #ff9500; }
    .priority-dot-low    { background: #c7c7cc; }

    .card-title {
      font-size: 0.93rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .card-desc {
      font-size: 0.84rem;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1d1d1f;
      color: #fff;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.83rem;
      transition: transform 0.25s ease;
      z-index: 200;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }

    #lightbox-close:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      #filter-bar, #count { padding-left: 16px; padding-right: 16px; }
      #grid { padding: 12px 16px 32px; }
    }
  </style>
</head>
<body>

<!-- Gate -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-title">Alon's isee.art feedback</div>
    <p class="gate-subtitle">Enter password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autofocus>
    <button onclick="checkPassword()">Enter</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Alon's isee.art feedback</h1>
    <div class="header-right">
      <span id="sync-indicator"></span>
      <button id="dark-btn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button id="token-btn" onclick="openTokenModal()">⚙ Sync</button>
      <span id="header-count"></span>
    </div>
  </header>

  <!-- Token modal -->
  <div id="token-modal-bg" onclick="closeTokenModal(event)">
    <div id="token-modal">
      <h2>GitHub Sync</h2>
      <p>Paste a fine-grained GitHub PAT with <strong>contents:write</strong> on this repo. Saved locally in your browser — never sent anywhere except GitHub's API.</p>
      <input id="token-input" type="password" placeholder="github_pat_…" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-danger" onclick="clearToken()">Remove</button>
        <button class="modal-btn modal-btn-secondary" onclick="closeTokenModal()">Cancel</button>
        <button class="modal-btn modal-btn-primary" onclick="saveToken()">Save</button>
      </div>
    </div>
  </div>

  <div id="filter-bar">
    <!-- Status -->
    <div class="filter-group" id="status-group">
      <button class="filter-btn active" data-val="All"        onclick="setFilter('status',this,'All')">All</button>
      <button class="filter-btn"        data-val="Open"       onclick="setFilter('status',this,'Open')">Open</button>
      <button class="filter-btn"        data-val="Done"       onclick="setFilter('status',this,'Done')">Done</button>
      <button class="filter-btn"        data-val="Irrelevant" onclick="setFilter('status',this,'Irrelevant')">Irrelevant</button>
    </div>

    <!-- Priority -->
    <div class="filter-group" id="priority-group">
      <button class="filter-btn active" data-val="All"    onclick="setFilter('priority',this,'All')">Any priority</button>
      <button class="filter-btn"        data-val="High"   onclick="setFilter('priority',this,'High')">High</button>
      <button class="filter-btn"        data-val="Medium" onclick="setFilter('priority',this,'Medium')">Medium</button>
      <button class="filter-btn"        data-val="Low"    onclick="setFilter('priority',this,'Low')">Low</button>
    </div>

    <!-- Section — populated dynamically -->
    <div class="filter-group" id="section-group"></div>

    <!-- Category -->
    <div class="filter-group" id="category-group">
      <button class="filter-btn active" data-val="All"          onclick="setFilter('category',this,'All')">All types</button>
      <button class="filter-btn"        data-val="UI/UX Bug"    onclick="setFilter('category',this,'UI/UX Bug')">UI/UX Bug</button>
      <button class="filter-btn"        data-val="Product Idea" onclick="setFilter('category',this,'Product Idea')">Product Idea</button>
      <button class="filter-btn"        data-val="User Flow"    onclick="setFilter('category',this,'User Flow')">User Flow</button>
      <button class="filter-btn"        data-val="General"      onclick="setFilter('category',this,'General')">General</button>
    </div>
  </div>

  <div id="count"></div>
  <div id="grid"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  // ═══════════════════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════════════════

  // SHA-256 of password (current: "iseeart")
  // To change: echo -n "newpassword" | shasum -a 256
  const PASSWORD_HASH = "f9d7ce1ef900e2ff3cf2706489d409e7a51ccfb3134ffb85245fbb7ff6272ebb";

  const GITHUB_REPO = "alon-slutzky/iseeart-feedback";

  // ═══════════════════════════════════════════════════════

  function getToken() { return localStorage.getItem("gh_token") || ""; }

  // ── Dark mode ──
  function toggleDark() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("dark", isDark ? "1" : "");
    document.getElementById("dark-btn").textContent = isDark ? "☀️" : "🌙";
  }

  // Apply saved preference immediately
  if (localStorage.getItem("dark") === "1") {
    document.body.classList.add("dark");
    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("dark-btn");
      if (btn) btn.textContent = "☀️";
    });
  }

  let cachedSha = null;
  let debounceTimer = null;

  function updateTokenBtn() {
    const btn = document.getElementById("token-btn");
    if (getToken()) { btn.textContent = "⚙ Sync: on"; btn.classList.add("connected"); }
    else            { btn.textContent = "⚙ Sync";     btn.classList.remove("connected"); }
  }

  function openTokenModal() {
    document.getElementById("token-input").value = getToken();
    document.getElementById("token-modal-bg").classList.add("open");
    document.getElementById("token-input").focus();
  }

  function closeTokenModal(e) {
    if (e && e.target !== document.getElementById("token-modal-bg")) return;
    document.getElementById("token-modal-bg").classList.remove("open");
  }

  function saveToken() {
    const val = document.getElementById("token-input").value.trim();
    if (val) localStorage.setItem("gh_token", val);
    document.getElementById("token-modal-bg").classList.remove("open");
    updateTokenBtn();
    showToast("Token saved — status changes will now sync for all users");
  }

  function clearToken() {
    localStorage.removeItem("gh_token");
    document.getElementById("token-input").value = "";
    document.getElementById("token-modal-bg").classList.remove("open");
    updateTokenBtn();
    showToast("Token removed — status changes are local only");
  }

  let allItems  = [];
  let statuses  = {};
  let activeStatus   = "All";
  let activePriority = "All";
  let activeSection  = "All";
  let activeCategory = "All";

  const STATUS_CYCLE = ["Open", "Done", "Irrelevant"];

  // ── Auth ──
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });

  async function checkPassword() {
    const hash = await sha256(document.getElementById("pw-input").value);
    if (hash === PASSWORD_HASH) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display  = "block";
      sessionStorage.setItem("auth", "1");
      init();
    } else {
      document.getElementById("gate-error").textContent = "Incorrect password.";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  if (sessionStorage.getItem("auth") === "1") {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display  = "block";
    init();
  }

  // ── Init ──
  async function init() {
    updateTokenBtn();
    if (localStorage.getItem("dark") === "1") document.getElementById("dark-btn").textContent = "☀️";
    await Promise.all([loadFeedback(), loadStatuses()]);
    buildSectionFilters();
    render();
  }

  // ── Load data ──
  async function loadFeedback() {
    const res = await fetch("feedback.json?" + Date.now());
    allItems = await res.json();
  }

  async function loadStatuses() {
    try {
      // Use API (not raw) so we get the SHA too — avoids an extra round-trip on first write
      if (getToken()) {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/statuses.json`,
          { headers: { Authorization: `Bearer ${getToken()}`, Accept: "application/vnd.github.v3+json" } }
        );
        const data = await res.json();
        cachedSha = data.sha;
        statuses = JSON.parse(atob(data.content.replace(/\n/g, "")));
      } else {
        const res = await fetch(
          `https://raw.githubusercontent.com/${GITHUB_REPO}/main/statuses.json?t=${Date.now()}`
        );
        statuses = await res.json();
      }
    } catch(e) { statuses = {}; }
  }

  // ── Section filter (dynamic) ──
  function buildSectionFilters() {
    const sections = ["All", ...new Set(allItems.map(i => i.section).filter(Boolean).sort())];
    const group = document.getElementById("section-group");
    group.innerHTML = "";
    sections.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (s === "All" ? " active" : "");
      btn.dataset.val = s;
      btn.textContent = s === "All" ? "All sections" : s;
      btn.onclick = () => setFilter("section", btn, s);
      group.appendChild(btn);
    });
  }

  // ── Filters ──
  function setFilter(type, btn, value) {
    const groupId = { status: "status-group", priority: "priority-group", section: "section-group", category: "category-group" }[type];
    document.querySelectorAll(`#${groupId} .filter-btn`).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (type === "status")   activeStatus   = value;
    if (type === "priority") activePriority = value;
    if (type === "section")  activeSection  = value;
    if (type === "category") activeCategory = value;
    render();
  }

  // ── Status management ──
  function getStatus(id) { return statuses[String(id)] || "Open"; }

  function cycleStatus(id, e) {
    e.stopPropagation();
    const cur = getStatus(id);
    statuses[String(id)] = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
    render();
    scheduleSave();
  }

  function scheduleSave() {
    if (!getToken()) return;
    setSyncState("saving");
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(persistStatuses, 800);
  }

  async function persistStatuses() {
    if (!getToken()) return;
    try {
      // Fetch SHA only if we don't have it cached
      if (!cachedSha) {
        const metaRes = await fetch(
          `https://api.github.com/repos/${GITHUB_REPO}/contents/statuses.json`,
          { headers: { Authorization: `Bearer ${getToken()}`, Accept: "application/vnd.github.v3+json" } }
        );
        const meta = await metaRes.json();
        cachedSha = meta.sha;
      }

      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_REPO}/contents/statuses.json`,
        {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${getToken()}`,
            "Content-Type": "application/json",
            Accept: "application/vnd.github.v3+json"
          },
          body: JSON.stringify({
            message: "Update feedback statuses",
            content: btoa(JSON.stringify(statuses, null, 2) + "\n"),
            sha: cachedSha
          })
        }
      );

      if (!res.ok) {
        // SHA was stale — clear cache and retry once
        cachedSha = null;
        if (res.status === 409) { await persistStatuses(); return; }
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();
      cachedSha = data.content.sha; // cache the new SHA for next write
      setSyncState("saved");
      setTimeout(() => setSyncState(""), 2000);
    } catch(e) {
      cachedSha = null;
      setSyncState("error");
      showToast("Failed to save — will retry on next change");
    }
  }

  function setSyncState(state) {
    const el = document.getElementById("sync-indicator");
    el.className = state || "";
    el.textContent = state === "saving" ? "Saving…" : state === "saved" ? "Saved ✓" : state === "error" ? "Save failed" : "";
  }

  // ── Render ──
  function badgeClass(cat) {
    if (cat === "UI/UX Bug")    return "badge-uiux";
    if (cat === "Product Idea") return "badge-idea";
    if (cat === "User Flow")    return "badge-flow";
    return "badge-general";
  }

  function statusClass(s) {
    if (s === "Done")       return "status-done";
    if (s === "Irrelevant") return "status-irrelevant";
    return "status-open";
  }

  function priorityDotClass(p) {
    if (p === "High")   return "priority-dot-high";
    if (p === "Medium") return "priority-dot-medium";
    return "priority-dot-low";
  }

  function render() {
    const items = allItems.filter(item => {
      const s = getStatus(item.id);
      if (activeStatus   !== "All" && s                              !== activeStatus)   return false;
      if (activePriority !== "All" && (item.priority || "Low")       !== activePriority) return false;
      if (activeSection  !== "All" && item.section                   !== activeSection)  return false;
      if (activeCategory !== "All" && item.category                  !== activeCategory) return false;
      return true;
    });

    document.getElementById("header-count").textContent =
      `${allItems.length} item${allItems.length !== 1 ? "s" : ""}`;
    document.getElementById("count").textContent =
      `${items.length} of ${allItems.length} shown`;

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    if (items.length === 0) {
      const empty = document.createElement("div");
      empty.style.cssText = "text-align:center;padding:60px 20px;color:#6e6e73;font-size:0.9rem";
      empty.textContent = "No items match the current filters.";
      grid.appendChild(empty);
      return;
    }

    items.forEach(item => {
      const status = getStatus(item.id);
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.status = status;

      const thumb = item.screenshot
        ? `<img class="card-thumb" src="screenshots/${item.screenshot}" alt="" loading="lazy" onclick="openLightbox('screenshots/${item.screenshot}')">`
        : "";

      const priority = item.priority || "Low";
      card.innerHTML = `
        <div class="card-body">
          <div class="card-meta">
            <span class="priority-dot ${priorityDotClass(priority)}" title="Priority: ${priority}"></span>
            <span class="badge ${badgeClass(item.category)}">${item.category}</span>
            <button class="status-btn ${statusClass(status)}"
              onclick="cycleStatus(${item.id}, event)"
              title="Click to cycle: Open → Done → Irrelevant">${status}</button>
            <span class="card-id">#${item.id}</span>
          </div>
          ${item.section ? `<div class="card-section">${escHtml(item.section)}</div>` : ""}
          <div class="card-title">${escHtml(item.title)}</div>
          <div class="card-desc">${escHtml(item.description)}</div>
        </div>
        ${thumb}
      `;
      grid.appendChild(card);
    });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, duration = 3000) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), duration);
  }

  // ── Lightbox ──
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("open");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
    document.getElementById("lightbox-img").src = "";
  }

  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
</script>
</body>
</html>
